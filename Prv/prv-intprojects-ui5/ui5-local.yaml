# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: prvintprojectsui5
type: application
framework:
  name: SAPUI5
  version: 1.136.2
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ushell
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
        backend:
          - url: https://cnx-dev-cf-prv-prv-intprojects-nodejs-srv.cfapps.eu20.hana.ondemand.com
            authenticationType: OAuth2UserTokenExchange
            destination: Agora-prvintprojects-HTTP
            path: /odata
          - path: /callOT
            url: https://cnx-dev-cf-prv-prv-intprojects-nodejs-srv.cfapps.eu20.hana.ondemand.com
            destination: Agora-CmmOpenText-HTTP
          - path: /v2/restriction
            url: https://cnx-dev-cf-acc-acc-service-nodejs-srv.cfapps.eu20.hana.ondemand.com
            destination: Agora-AccService-HTTP
    - name: sap-fe-mockserver
      beforeMiddleware: csp
      configuration:
        mountPath: /
        services:
          - urlPath: /odata/v2/service/project
            metadataPath: ./webapp/localService/mainService/metadata.xml
            mockdataPath: ./webapp/localService/mainService/data
            generateMockData: true
        annotations: []
