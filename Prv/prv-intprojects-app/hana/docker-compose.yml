services:
  hana:
    image: saplabs/hanaexpress:2.00.088.00.20251110.1
    container_name: prv-intprojects-hana
    hostname: hxehost
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    ports:
      - '39013:39013'
      - '39017:39017'
      - '39041-39045:39041-39045'
      - '1128-1129:1128-1129'
      - '59013-59014:59013-59014'
    volumes:
      - hana-data:/hana/mounts
      - ./passwords.json:/etc/hxe/passwords.json:ro
    command:
      - --agree-to-sap-license
      - --passwords-url
      - file:///etc/hxe/passwords.json
    restart: unless-stopped

volumes:
  hana-data:
